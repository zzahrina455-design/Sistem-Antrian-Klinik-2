<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
        <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    </head>
    
    <style> 
        body{
            background-image:
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("https://rsudibnusina.gresikkab.go.id/web/uploads/igdprofile/igdprofile.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
    
    <div class="container mt-5 text-center">
    <div class="card col-md-4 mx-auto p-4 bg-success-subtle">
        <h5 class="text-center">Registrasi</h5>
        <input id="email" class="form-control mb-2" placeholder="Email">
    <div class="input-group mb-3">
        <input id="username" class="form-control mb-2" placeholder="Username">
    <div class="input-group mb-3">
        <input id="password" type="password"class="form-control"placeholder="Password">
        
        <span class="input-group-text"
            onclick="lihatPassword()"
            style="cursor:pointer">
            <i id="icon" class="bi bi-eye"></i>
        </span>
    </div>
    
    <button class="btn btn-success w-100" onclick="register()">Register</button>

    <div class="text-center">
        <a href="login.html" class="text-success">Sudah punya akun?</a>
    </div>
    </div>
    </div>
    
    <script>
    function register(){
        let email = document.getElementById("email").value
        let user = document.getElementById("username").value
        let pass = document.getElementById("password").value

        localStorage.setItem("email", email)
        localStorage.setItem("user", user)
        localStorage.setItem("pass", pass)

        alert("Register berhasil")
        window.location="login.html"
    }
    </script>

    <script>
    function lihatPassword(){
        let pass = document.getElementById("password")
        let icon = document.getElementById("icon")
    if(pass.type === "password"){
        pass.type = "text"
        icon.className = "bi bi-eye-slash"
        }else{
            pass.type = "password"
            icon.className = "bi bi-eye"
        }
    }
    </script>

</body>
</html>
