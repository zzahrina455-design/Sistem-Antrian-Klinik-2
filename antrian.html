<!DOCTYPE html>
<html>
    <head>
        <title>Antrian</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body>
        <nav class="navbar navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand">Sistem Klinik</a>
            <div>
                <a href="dashboard.html" class="btn btn-light">Dashboard</a>
            </div>
            </div>
        </nav>

            <div class="container mt-4">
                <h3>Ambil Nomor Antrian</h3>
                <input id="nama" type="text" class="form-control mb-2" placeholder="Nama">
                <input id="tanggal" type="date" class="form-control mb-2">
                <select id="poli" class="form-control mb-2">
                    <option>Poliklinik</option>
                    <option>Poliklinik Anak</option>
                    <option>Poliklinik Gigi</option>
                    <option>Poliklinik Bedah</option>
                    <option>Poliklinik Saraf</option>
                    <option>Poliklinik Jiwa</option>
                    <option>Poliklinik THT</option>
                    <option>Poliklinik Mata</option>
                    <option>Poliklinik Paru</option>
                    <option>Poliklinik Rehab Medis</option>
                    <option>Poliklinik Gizi</option>
                </select>
                
                <button onclick="ambil()" class="btn btn-success">Ambil</button>
                    <div id="hasil" class="mt-3"></div>
            </div>
            
            <script>
                let no=0
                function ambil(){
                    no++
                    let t = document.getElementById("tanggal").value
                    let p = document.getElementById("poli").value
                    let nomor = "A-"+no
                    document.getElementById("hasil").innerHTML=
                        "Nomor : "+nomor+
                        "<br>Nama :"+n+
                        "<br>Tanggal :"+t+
                        "<br>Poli :"+p
                }
            </script>
    </body>
</html>
