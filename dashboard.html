// ANTRIAN
let no=0
function showAntrian(){
    document.getElementById("judul").innerHTML="Ambil Antrian"
    document.getElementById("isi").innerHTML=`
    <input id="nama" type="text" class="form-control mb-2" placeholder="Nama">
    <input id="tgl" type="date" class="form-control mb-2">
    <select id="poli" class="form-control mb-2">
        <option>Poliklinik</option>
        <option>Poliklinik Anak</option>
        <option>Poliklinik Gigi</option>
        <option>Poliklinik Bedah</option>
        <option>Poliklinik Saraf</option>
        <option>Poliklinik Jiwa</option>
        <option>Poliklinik THT</option>
        <option>Poliklinik Mata</option>
        <option>Poliklinik Paru</option>
        <option>Poliklinik Rehab Medis</option>
        <option>Poliklinik Gizi</option>
    </select>
    <button onclick="ambil()" class="btn btn-success">
        Ambil
    </button>
    <div id="hasil" class="mt-3"></div>
`
}
function ambil(){
    no++
    let n=document.getElementById("nama").value
    let t=document.getElementById("tgl").value
    let p=document.getElementById("poli").value
    document.getElementById("hasil").innerHTML=
    "Nomor : A-"+no+
    "<br>Nama :"+n+
    "<br>Tanggal :"+t+
    "<br>Poli :"+p
}

    let nama = localStorage.getItem("nama");
    let email = localStorage.getItem("email");
    if(nama){
        document.getElementById("namaUser").innerHTML = nama;
    }
    if(email){
        document.getElementById("emailUser").innerHTML = email;
    }
        document.getElementById("uploadFoto").addEventListener("change", function(){
    let file = this.files[0];
    let reader = new FileReader();
    reader.onload = function(e){
        document.getElementById("fotoProfil").src = e.target.result;
        localStorage.setItem("foto", e.target.result);
    }
    reader.readAsDataURL(file);
});
    let foto = localStorage.getItem("foto");
    if(foto){
        document.getElementById("fotoProfil").src = foto;
    }
    
    </script>
