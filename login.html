<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
        
        <style>
        body{
            font-family: 'Poppins', sans-serif;
        }
        </style>
    </head>

        <style> 
        body{
            background-image:
            linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url("https://rsudibnusina.gresikkab.go.id/web/uploads/igdprofile/igdprofile.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
        </style>
        
        <div class="container mt-5 text-center">
        <div class="card col-md-4 mx-auto p-4 bg-success-subtle">
            <h3 class="text-center">Login</h3>
            <input id="email" class="form-control mb-2" placeholder="Email">
        <div class="input-group mb-2">
            <input id="username" class="form-control mb-2" placeholder="Username">
        <div class="input-group mb-2">
            <input id="password" type="password" class="form-control" placeholder="Password">
            <span class="input-group-text" onclick="togglePassword()">
                <i class="bi bi-eye"></i>
            </span>
        </div>
        
        <button class="btn btn-success w-100" onclick="login()">Login</button>
        </div>
        </div>
    
        <script>
        function togglePassword(){
            let pass = document.getElementById("password")
            if(pass.type === "password"){
                pass.type = "text"
            }else{
                pass.type = "password"
            }
        }

        function login(){
            let u = document.getElementById("username").value
            let p = document.getElementById("password").value

            let user = localStorage.getItem("user")
            let pass = localStorage.getItem("pass")
            if(u==user && p==pass){
                let email = localStorage.getItem("email")
                    localStorage.setItem("loginEmail", email)
                    window.location="dashboard.html"
            }else{
                alert("Login gagal")
            }
        }
        </script>

</body>
</html>
